name: Language Metrics

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  languages:
    runs-on: ubuntu-latest
    name: Generate language breakdown (incl. orgs)
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          # A personal-access-token (classic, `repo` scope) is required so the
          # languages plugin can see repositories in the flux-creations org.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-languages.svg
          base: ""
          config_timezone: Europe/Warsaw

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          repositories_affiliations: owner, collaborator, organization_member
